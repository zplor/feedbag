    <style id="feedbag-initial-loader-style">
      #feedbag-initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #fff;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.2s ease-out;
      }

      html.dark #feedbag-initial-loader {
        background-color: #0d0d0d;
      }

      #feedbag-initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      @keyframes feedbag-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      .feedbag-spinner {
        animation: feedbag-spin 1s linear infinite;
        color: #4b5563;
      }

      html.dark .feedbag-spinner {
        color: #d1d5db;
      }

      .feedbag-text {
        color: #1a1a1a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      html.dark .feedbag-text {
        color: #ececec;
      }

      .feedbag-loading-text {
        color: #4b5563;
        font-size: 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      html.dark .feedbag-loading-text {
        color: #d1d5db;
      }
    </style>
    <script>
      (() => {
        // Loading controller
        window.__FEEDBAG_SHOW_LOADING__ = () => {
          var loader = document.getElementById("feedbag-initial-loader");
          if (loader) {
            loader.classList.remove("hidden");
            loader.style.display = "flex";
          }
        };
        window.__FEEDBAG_HIDE_LOADING__ = () => {
          var loader = document.getElementById("feedbag-initial-loader");
          if (loader) {
            loader.classList.add("hidden");
            // Wait for fade-out animation to complete before hiding
            setTimeout(() => {
              loader.style.display = "none";
            }, 300); // Match the transition duration
          }
        };
      })();
    </script>
